<section id="contact" class="contact_wrapper">
  <div class="container">
    <div class="row justify-content-between align-items-center">
      <div class=" mb-4 col-lg-6 order-2 order-lg-1 text-lg-start text-center">
        <h2>Contact Us</h2>
        <div class="row call_details">
          <label for="" class="col-sm-3 col-lg-4">Call us directly:</label>
          <div class="col-sm-9 col-lg-8 mb-3 mb-lg-2 text-md-start">
            <a href="javascript:void(0)">+91 8484870974</a>
          </div>
          <label for="" class="col-sm-3 col-lg-4">Contact Email:</label>
          <div class="col-sm-9 col-lg-8 mb-3 mb-lg-2 text-md-start">
            <a href="mailto:dakshataramteke00@gmail.com">dakshataramteke00@gmail.com</a>
          </div>
        </div>
        <form action="">
          <div class="mb-4">
            <input type="text" class="form-control" placeholder="Your Name" autocomplete="off" required>
          </div>
          <div class="mb-4">
            <input type="number" class="form-control" placeholder="Your Contact Number" autocomplete="off" required>
          </div>
          <div class="mb-4">
            <input type="email" class="form-control" placeholder="Your Email" autocomplete="off" required>
          </div>
          <div class="mb-4">
            <textarea name="" id="message" cols="40" rows="4" class="form-control" placeholder="Write a Message" autocomplete="off"></textarea>
          </div>
          <button type="submit" class="main_btn">Submit</button>
        </form>
      </div>
      <div class="col-lg-6 order-1 mb-4 order-lg-1 mb-lg-0">
        <img src="/assests/images/phonering.jpg" class="img-fluid" alt="">
